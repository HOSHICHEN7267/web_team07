version: "3.9"

services:
  django:
    build: .
    image: ryan881225/backend-django:v2
    ports:
      - "8000:8000"
      - "8001:8000"
    volumes:
      - .:/HW_Report/backend
    depends_on:
      - mysql
    container_name: web_django

  mysql:
    image: ryan881225/my-mysql:v2
    restart: always
    environment:
      MYSQL_DATABASE: hw_db
      MYSQL_USER: hw_user
      MYSQL_PASSWORD: hw_pass
      MYSQL_ROOT_PASSWORD: root_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    container_name: hw_mysql

volumes:
  mysql_data:
